<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Formulario de Contacto</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="logo.png" alt="Logo Fujiyama" onerror="this.src='https://placehold.co/200x60?text=LOGO'" />
      </div>
    </header>

    <div class="qr-message">
      <p>¡Bienvenido! Descubre más sobre tu vehículo aquí</p>
    </div>

    <div class="form-steps">
      <div class="step active" data-step="1">1</div>
      <div class="step" data-step="2">2</div>
      <div class="step" data-step="3">3</div>
    </div>

    <div class="form-container">
      <form id="contactForm" onsubmit="return false;">
        
        <!-- Paso 1 -->
        <div class="form-step active" id="step-1">
          <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Carlos Pérez" required />
            <div class="error" id="nombre-error"></div>
          </div>

          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required />
            <div class="error" id="email-error"></div>
          </div>

          <div class="form-group">
            <label for="telefono">Teléfono (WhatsApp)</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej. 3001234567" maxlength="10" required />
            <div class="error" id="telefono-error"></div>
          </div>

          <div class="navigation-buttons">
            <div></div>
            <button type="button" class="btn" onclick="nextStep(1)">Siguiente</button>
          </div>
        </div>

        <!-- Paso 2 -->
        <div class="form-step" id="step-2">
          <!-- <div class="form-group autocomplete-field">
            <label for="ciudad-input">Ciudad</label>

            <input type="text" id="ciudad-input" placeholder="Escribe tu ciudad..." autocomplete="off">
            <input type="hidden" id="ciudad" name="ciudad">

            <div class="autocomplete-panel" id="ciudad-list"></div>
            <div class="error" id="ciudad-error"></div>
          </div> -->
          <div class="form-group autocomplete-field">
            <label for="ciudad-input">Ciudad</label>

            <input 
              type="text" 
              id="ciudad-input" 
              placeholder="Escribe tu ciudad..." 
              autocomplete="off" 
            />

            <input type="hidden" id="ciudad" name="ciudad" />

            <div class="autocomplete-panel" id="ciudad-list"></div>

            <div class="error" id="ciudad-error"></div>
          </div>

          <div class="form-group autocomplete-field">
            <label for="origen-input">¿Dónde viste el vehículo o escaneaste el QR?</label>
            <input type="text" id="origen-input" placeholder="Escribe para buscar..." autocomplete="off" />
            <input type="hidden" id="origen" name="origen" />
            <div class="autocomplete-panel" id="options-origen"></div>
            <div class="error" id="origen-error"></div>
          </div>

          <div class="form-group autocomplete-field">
            <label for="marca-input">Marca</label>
            <input type="text" id="marca-input" placeholder="Escribe para buscar..." autocomplete="off" />
            <input type="hidden" id="marca" name="marca" />
            <div class="autocomplete-panel" id="options-marca"></div>
            <div class="error" id="marca-error"></div>
          </div>

          <div class="form-group autocomplete-field">
            <label for="modelo-input">Modelo</label>
            <input type="text" id="modelo-input" placeholder="Selecciona primero una marca" autocomplete="off" disabled />
            <input type="hidden" id="modelo" name="modelo" />
            <div class="autocomplete-panel" id="options-modelo"></div>
            <div class="error" id="modelo-error"></div>
          </div>

          <div class="navigation-buttons">
            <button type="button" class="btn btn-secondary" onclick="prevStep(2)">Anterior</button>
            <button type="button" class="btn" onclick="nextStep(2)">Siguiente</button>
          </div>
        </div>

        <!-- Paso 3 -->
        <div class="form-step" id="step-3">
          <div class="form-group">
            <label for="comentarios">Comentarios adicionales (Opcional)</label>
            <input type="text" id="comentarios" name="comentarios">
          </div>

          <div class="form-group">
            <div style="display: inline;">
                <label for="privacidad">
                    <input type="checkbox" id="privacidad" name="privacidad" required />
                    Acepto la 
                    <span id="open-privacidad" class="link-privacidad">
                    política de privacidad
                </span>
                </label>
                
                </div>
            <div class="error" id="privacidad-error"></div>
          </div>

          <div class="navigation-buttons" id="step-3-buttons">
            <button type="button" class="btn btn-secondary" onclick="prevStep(3)">Anterior</button>
            <button type="button" class="btn" onclick="submitForm()">Enviar Solicitud</button>
          </div>

          <div id="loading-message" class="completed-message" style="display:none;">
            <div class="spinner"></div>
            <h2>Procesando tu solicitud...</h2>
            <p>Conectando con un asesor.</p>
          </div>
        </div>
      </form>

      <div id="success-message" class="completed-message" style="display:none;">
        <!-- <img src="verificar.png" alt="OK" /> -->
        <h2>✅ ¡Gracias por registrarte!</h2>
        <p>Haz clic aquí y recibe atención inmediata vía WhatsApp:</p>

        <a id="whatsapp-btn" href="#" class="verde-button" target="_blank">
          <img src="whatsapp.png" class="boton-icono">
        </a>

        <h2 class="texto2">🚘También puedes conocer nuestro portafolio completo aquí:</h2>
        <!-- <p>Haz clic aquí y recibe atención inmediata vía WhatsApp:</p> -->

        <a id="whatsapp-btn" href="https://automotoresfujiyama.com/" class="verde-button" target="_blank">
          <img src="logo.png" class="boton-icono2">
        </a>
      </div>
    </div>
  </div>

  <!-- Modal de Privacidad -->


  <script src="script.js"></script>

    <div id="modal-privacidad" class="modal">
      <div class="modal-content modal-large">

        <span class="close-modal" id="close-privacidad">&times;</span>

        <iframe 
          src="tratamientoDeDatos.html"
          frameborder="0"
          class="privacy-frame">
        </iframe>

      </div>
    </div>
    
</body>
</html>
